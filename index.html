<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✏️ PAGE TITLE: Change "VORTEX Studio" to your agency name -->
  <title>AXIVO — Design Agency</title>
  <!-- ✏️ META DESCRIPTION: Update for SEO -->
  <meta name="description" content="Award-winning design agency specializing in brand identity, web design, and motion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <!-- ✏️ FAVICON: Add your favicon file and update href -->
  <!-- <link rel="icon" href="favicon.ico" /> -->
</head>
<body class="bg-black text-white overflow-x-hidden">

  <!-- ══════════════════════════════════════════════════════
       PAGE LOADER
       ── HOW TO USE YOUR LOGO IN THE LOADER ──
       Option A (Image Logo):
         1. Place your logo file in this folder (e.g. logo.svg)
         2. Open config.js
         3. Set: logo.useLogo = true
         4. Set: logo.loaderLogoFile = "logo.svg"
         5. Set: logo.loaderLogoHeight = "80px" (adjust as needed)
       Option B (Text Logo):
         - Just set logo.useLogo = false (default)
         - The brand name from config.js → brand.name is used
       ══════════════════════════════════════════════════════ -->
  <div class="page-loader" id="pageLoader">
    <div class="text-center">
      <div class="loader-logo" id="loaderLogo"><!-- auto-filled by main.js --></div>
      <div class="loader-progress mt-6"></div>
    </div>
    <div class="loader-bar"></div>
  </div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- ══════════════════════════════════════════════════════
       NAVIGATION
       ── HOW TO USE YOUR LOGO IN THE NAV ──
       Same as loader: set config.js → logo.useLogo = true, logo.logoFile = "logo.svg"
       The brand-logo class elements are all auto-filled by main.js
       ══════════════════════════════════════════════════════ -->
  <nav class="fixed top-0 left-0 w-full z-50 nav-glass px-6 md:px-16 py-5 flex items-center justify-between" id="siteNav"></nav>
  <div id="mobileMenu" class="mobile-menu fixed top-0 left-0 w-full h-screen bg-black z-40 flex flex-col items-center justify-center gap-8 hidden" id="mobileNav"></div>

  <!-- ══════════════════════════════════════════════════════
       HERO
       ✏️ Edit all text in config.js → brand section
       ══════════════════════════════════════════════════════ -->
  <section class="hero-section min-h-screen flex items-center relative overflow-hidden px-6 md:px-16 pt-24">
    <div class="noise-overlay"></div>
    <div class="hero-grid-bg"></div>
    <div class="float-shape shape-1"></div>
    <div class="float-shape shape-2"></div>
    <div class="float-shape shape-3"></div>

    <div class="relative z-10 max-w-7xl mx-auto w-full">
      <div class="overflow-hidden mb-4">
        <p class="hero-eyebrow reveal-up" style="animation-delay:.1s" id="heroEyebrow"></p>
      </div>
      <div class="overflow-hidden">
        <h1 class="hero-headline reveal-up" style="animation-delay:.2s" id="heroLine1"></h1>
      </div>
      <div class="overflow-hidden flex items-center gap-6">
        <h1 class="hero-headline reveal-up text-red-500" style="animation-delay:.35s" id="heroLine2"></h1>
        <div class="hero-line reveal-up" style="animation-delay:.4s"></div>
      </div>
      <div class="overflow-hidden">
        <h1 class="hero-headline reveal-up" style="animation-delay:.5s">
          <span id="heroLine3"></span> <span class="stroke-text" id="heroLine4"></span>
        </h1>
      </div>
      <div class="mt-10 flex flex-col md:flex-row items-start md:items-center gap-8 reveal-fade" style="animation-delay:.7s">
        <p class="hero-subtext max-w-md" id="heroSubtext"></p>
        <div class="flex gap-4">
          <a href="services.html" class="btn-primary">Explore Work</a>
          <a href="about.html"    class="btn-outline">Our Story</a>
        </div>
      </div>
      <!-- ✏️ STATS: Edit in config.js → stats[] -->
      <div id="heroStats" class="mt-20 grid grid-cols-2 md:grid-cols-4 gap-6 reveal-fade" style="animation-delay:.9s"></div>
    </div>
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 scroll-indicator">
      <div class="scroll-dot"></div>
    </div>
  </section>

  <!-- MARQUEE -->
  <!-- ✏️ MARQUEE: Edit the words below directly -->
  <div class="marquee-strip py-4 border-y border-red-500/30 overflow-hidden">
    <div class="marquee-inner">
      <span>BRANDING</span><span class="text-red-500">✦</span><span>WEB DESIGN</span><span class="text-red-500">✦</span><span>UI/UX</span><span class="text-red-500">✦</span><span>MOTION</span><span class="text-red-500">✦</span><span>STRATEGY</span><span class="text-red-500">✦</span><span>IDENTITY</span><span class="text-red-500">✦</span><span>PACKAGING</span><span class="text-red-500">✦</span><span>BRANDING</span><span class="text-red-500">✦</span><span>WEB DESIGN</span><span class="text-red-500">✦</span><span>UI/UX</span><span class="text-red-500">✦</span><span>MOTION</span><span class="text-red-500">✦</span><span>STRATEGY</span><span class="text-red-500">✦</span><span>IDENTITY</span><span class="text-red-500">✦</span><span>PACKAGING</span><span class="text-red-500">✦</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       FEATURED PROJECTS
       ── HOW TO ADD PROJECT IMAGES ──
       1. Place your image in this folder (jpg/png/webp recommended)
       2. Open config.js → find the project by id
       3. Set: useImage: true
       4. Set: image: "your-cover-image.jpg"
       To add a new project: copy any project block in config.js,
       give it a new id, set featured: true to show on homepage.
       ══════════════════════════════════════════════════════ -->
  <section class="py-24 px-6 md:px-16">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-16 scroll-reveal">
        <div>
          <p class="section-eyebrow">Selected Work</p>
          <!-- ✏️ SECTION TITLE: Edit directly here -->
          <h2 class="section-title">PROJECTS<br/><span class="text-red-500">THAT SPEAK</span></h2>
        </div>
        <a href="services.html" class="hidden md:block btn-outline">View All Work →</a>
      </div>
      <!-- Masonry-style grid — first card spans full width -->
      <div id="heroProjects" class="projects-masonry">
        <!-- Auto-rendered by main.js from config.js → projects[] (featured:true) -->
      </div>
    </div>
  </section>

  <!-- CTA BAND -->
  <section class="cta-band py-24 px-6 md:px-16 relative overflow-hidden">
    <div class="noise-overlay opacity-30"></div>
    <div class="max-w-4xl mx-auto text-center relative z-10 scroll-reveal">
      <!-- ✏️ CTA TEXT: Edit directly here -->
      <p class="section-eyebrow text-center">Ready?</p>
      <h2 class="cta-title">YOUR BRAND<br/><span class="stroke-text-red">DESERVES</span><br/>THE BEST</h2>
      <a href="contact.html" class="btn-primary mt-10 inline-block text-lg">Start a Project →</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer-section px-6 md:px-16 py-16 border-t border-red-900/30" id="siteFooter"></footer>

  <!-- GLOBAL WIDGETS -->
  <button id="backToTop" title="Back to top">↑</button>
  <div id="cookieBanner"></div>

  <!-- ✏️ SCRIPTS: Load order is important — do not rearrange -->
  <script src="config.js"></script>
  <script src="components.js"></script>
  <script src="main.js"></script>
</body>
</html>

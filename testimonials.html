<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials — AXIVO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-black text-white overflow-x-hidden">

  <div class="page-loader" id="pageLoader">
    <div class="text-center">
      <div class="loader-logo" id="loaderLogo"></div>
      <div class="loader-progress mt-6"></div>
    </div>
    <div class="loader-bar"></div>
  </div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>
  <nav class="fixed top-0 left-0 w-full z-50 nav-glass px-6 md:px-16 py-5 flex items-center justify-between" id="siteNav"></nav>
  <div id="mobileMenu" class="mobile-menu fixed top-0 left-0 w-full h-screen bg-black z-40 flex flex-col items-center justify-center gap-8 hidden" id="mobileNav"></div>

  <!-- PAGE HERO -->
  <section class="page-hero pt-28">
    <div class="page-hero-grid"></div>
    <div class="float-shape shape-1"></div>
    <div class="relative z-10 w-full">
      <p class="section-eyebrow reveal-up" style="animation-delay:.1s">Social Proof</p>
      <h1 class="page-hero-title reveal-up" style="animation-delay:.25s">CLIENT<br/><span class="text-red-500">WORDS</span></h1>
    </div>
  </section>

  <!-- FEATURED QUOTE (first testimonial from config.js) -->
  <!-- ✏️ FEATURED QUOTE: Edit in config.js → testimonials[0] (the first one) -->
  <section class="py-24 px-6 md:px-16 border-b border-red-900/10">
    <div class="max-w-5xl mx-auto text-center scroll-reveal" id="featuredTestimonial">
      <!-- Auto-filled by main.js from config.js → testimonials[0] -->
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       TESTIMONIALS GRID
       ── HOW TO ADD/EDIT TESTIMONIALS ──
       Open config.js → testimonials[] array
       Each testimonial has: text, author, company, avatar, stars
       - avatar: 2-letter initials shown as avatar circle
       - To add: copy any object, paste below the last one
       - To remove: delete its object
       The first testimonial (index 0) is shown as the featured quote above.
       ══════════════════════════════════════════════════════ -->
  <section class="py-24 px-6 md:px-16">
    <div class="max-w-7xl mx-auto">
      <div class="mb-16 scroll-reveal">
        <p class="section-eyebrow">All Reviews</p>
        <h2 class="section-title">WHAT CLIENTS<br/><span class="text-red-500">SAY</span></h2>
      </div>
      <div id="testimonialsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Auto-rendered by main.js from config.js → testimonials[] -->
      </div>
    </div>
  </section>

  <!-- NUMBERS / STATS -->
  <!-- ✏️ STATS: Edit in config.js → stats[] -->
  <section class="py-20 px-6 md:px-16 bg-black border-y border-red-900/10">
    <div class="max-w-7xl mx-auto">
      <div id="testimonialsStats" class="grid grid-cols-2 md:grid-cols-4 gap-8">
        <!-- Auto-rendered from config.js → stats[] -->
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta-band py-20 px-6 md:px-16 relative overflow-hidden">
    <div class="noise-overlay opacity-30"></div>
    <div class="max-w-3xl mx-auto text-center relative z-10 scroll-reveal">
      <p class="section-eyebrow text-center">Join them</p>
      <h2 class="cta-title">BE OUR<br/><span class="stroke-text-red">NEXT</span><br/>SUCCESS</h2>
      <a href="contact.html" class="btn-primary mt-10 inline-block">Start a Project →</a>
    </div>
  </section>

  <footer class="footer-section px-6 md:px-16 py-16 border-t border-red-900/30" id="siteFooter"></footer>
  <button id="backToTop" title="Back to top">↑</button>
  <div id="cookieBanner"></div>

  <script src="config.js"></script>
  <script src="components.js"></script>
  <script src="main.js"></script>
</body>
</html>

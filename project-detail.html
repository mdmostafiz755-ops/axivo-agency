<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — AXIVO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>
<body class="bg-black text-white overflow-x-hidden" id="projectDetail">

  <div class="page-loader" id="pageLoader">
    <div class="text-center">
      <div class="loader-logo" id="loaderLogo"></div>
      <div class="loader-progress mt-6"></div>
    </div>
    <div class="loader-bar"></div>
  </div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>
  <nav class="fixed top-0 left-0 w-full z-50 nav-glass px-6 md:px-16 py-5 flex items-center justify-between" id="siteNav"></nav>
  <div id="mobileMenu" class="mobile-menu fixed top-0 left-0 w-full h-screen bg-black z-40 flex flex-col items-center justify-center gap-8 hidden" id="mobileNav"></div>

  <!-- BACK -->
  <div class="pt-28 px-6 md:px-16 pb-4">
    <a href="services.html" class="back-link">← Back to Projects</a>
  </div>

  <!-- ══════════════════════════════════════════════════════
       PROJECT HERO IMAGE
       ── HOW THIS WORKS ──
       The hero image/gradient is set in config.js → projects[]
       For each project:
         useImage: false → shows gradient (gradient: "linear-gradient(...)") 
         useImage: true  → shows your image (image: "filename.jpg")
       
       ── HOW TO ADD A COVER IMAGE ──
       1. Place your image in this folder
       2. Open config.js → find the project
       3. Set: useImage: true
       4. Set: image: "project-cover.jpg"
       ══════════════════════════════════════════════════════ -->
  <div class="project-hero-image px-6 md:px-16">
    <div id="pdHero" style="width:100%;height:100%;position:relative;"></div>
  </div>

  <!-- PROJECT CONTENT -->
  <section class="py-16 px-6 md:px-16">
    <div class="max-w-7xl mx-auto">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">

        <!-- MAIN CONTENT -->
        <div class="lg:col-span-2">
          <!-- Auto-filled by main.js from config.js → projects[] matching ?id= param -->
          <p class="section-eyebrow mb-3" id="pdTag"></p>
          <h1 id="pdTitle" class="page-hero-title reveal-up" style="font-size:clamp(3rem,7vw,7rem);"></h1>

          <!-- ══════════════════════════════════════════════
               PROJECT BODY TEXT
               ── HOW TO EDIT PROJECT CONTENT ──
               Open config.js → find the project by id
               Edit the body: "" string with HTML content
               Supported tags: <h2>, <p>, <ul>, <li>
               ══════════════════════════════════════════════ -->
          <div class="project-content mt-10 scroll-reveal" id="pdBody"></div>

          <!-- ══════════════════════════════════════════════
               PROJECT GALLERY
               ── HOW TO ADD GALLERY IMAGES ──
               Open config.js → find the project → gallery: []
               Each gallery item:
                 { useImage: false, gradient: "..." }  → gradient placeholder
                 { useImage: true,  image: "filename.jpg" } → your image
               Add up to 4 items for a 2x2 grid
               ══════════════════════════════════════════════ -->
          <div class="mt-16">
            <p class="section-eyebrow mb-8">Project Gallery</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="pdGallery"></div>
          </div>
        </div>

        <!-- SIDEBAR -->
        <div class="scroll-reveal">
          <div class="project-sidebar">
            <!-- Auto-filled from config.js project data -->
            <div class="sidebar-block">
              <span class="sidebar-label">Client</span>
              <!-- ✏️ SIDEBAR DATA: All filled from config.js → projects[] -->
              <span class="sidebar-value" id="pdClient"></span>
            </div>
            <div class="sidebar-block">
              <span class="sidebar-label">Year</span>
              <span class="sidebar-value" id="pdYear"></span>
            </div>
            <div class="sidebar-block">
              <span class="sidebar-label">Services</span>
              <div class="flex flex-wrap gap-2 mt-3" id="pdServices"></div>
            </div>
            <div class="sidebar-block">
              <span class="sidebar-label">Duration</span>
              <span class="sidebar-value" id="pdDuration"></span>
            </div>
            <div class="sidebar-block" style="border:none">
              <span class="sidebar-label">Result</span>
              <span class="sidebar-value text-red-500 text-xl font-bold" id="pdResult"></span>
            </div>
          </div>
          <a href="contact.html" class="btn-primary w-full text-center block mt-6">Start a Similar Project →</a>
          <a href="services.html" class="btn-outline w-full text-center block mt-3">← All Projects</a>
        </div>

      </div>
    </div>
  </section>

  <!-- MORE PROJECTS -->
  <!-- ✏️ MORE PROJECTS: Automatically shows 2 other projects from config.js -->
  <section class="py-24 px-6 md:px-16 border-t border-red-900/10">
    <div class="max-w-7xl mx-auto">
      <div class="mb-12 scroll-reveal">
        <p class="section-eyebrow">More Work</p>
        <h2 class="section-title">OTHER<br/><span class="text-red-500">PROJECTS</span></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="pdMore"></div>
    </div>
  </section>

  <footer class="footer-section px-6 md:px-16 py-16 border-t border-red-900/30" id="siteFooter"></footer>
  <button id="backToTop" title="Back to top">↑</button>
  <div id="cookieBanner"></div>

  <script src="config.js"></script>
  <script src="components.js"></script>
  <script src="main.js"></script>
</body>
</html>

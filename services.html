<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✏️ PAGE TITLE: Update to your agency name -->
  <title>Services — AXIVO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-black text-white overflow-x-hidden">

  <div class="page-loader" id="pageLoader">
    <div class="text-center">
      <div class="loader-logo" id="loaderLogo"></div>
      <div class="loader-progress mt-6"></div>
    </div>
    <div class="loader-bar"></div>
  </div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>
  <nav class="fixed top-0 left-0 w-full z-50 nav-glass px-6 md:px-16 py-5 flex items-center justify-between" id="siteNav"></nav>
  <div id="mobileMenu" class="mobile-menu fixed top-0 left-0 w-full h-screen bg-black z-40 flex flex-col items-center justify-center gap-8 hidden" id="mobileNav"></div>

  <!-- PAGE HERO -->
  <section class="page-hero pt-28">
    <div class="page-hero-grid"></div>
    <div class="float-shape shape-1"></div>
    <div class="relative z-10 w-full">
      <!-- ✏️ HERO TITLE: Edit directly here -->
      <p class="section-eyebrow reveal-up" style="animation-delay:.1s">What We Do</p>
      <h1 class="page-hero-title reveal-up" style="animation-delay:.25s">OUR<br/><span class="text-red-500">SERVICES</span></h1>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       SERVICES GRID
       ── HOW TO ADD OR EDIT SERVICES ──
       Open config.js → services[] array
       Each service has: num, icon, name, desc, tags, highlight
       - highlight: true → shows the card with a red accent (use for featured service)
       - To add a service: copy any object in the array and change the details
       - To remove a service: delete its object from the array
       - Icon is any single character/symbol (emoji or unicode work too)
       ══════════════════════════════════════════════════════ -->
  <section class="py-24 px-6 md:px-16">
    <div class="max-w-7xl mx-auto">
      <div class="mb-16 scroll-reveal">
        <p class="section-eyebrow">Full Offering</p>
        <h2 class="section-title">EVERYTHING<br/><span class="text-red-500">YOU NEED</span></h2>
      </div>
      <!-- 3-column grid for services — auto-fills from config.js -->
      <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Auto-rendered by main.js from config.js → services[] -->
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       PROJECTS SECTION
       ── HOW TO ADD PROJECT IMAGES ──
       1. Place image files in this folder (jpg/png/webp)
       2. Open config.js → projects[]
       3. Find the project, set useImage: true, image: "filename.jpg"
       4. Also add gallery images in the gallery[] array for the detail page
       ══════════════════════════════════════════════════════ -->
  <section class="py-24 px-6 md:px-16 border-t border-red-900/10">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-16 scroll-reveal">
        <div>
          <p class="section-eyebrow">Our Work</p>
          <h2 class="section-title">SELECTED<br/><span class="text-red-500">PROJECTS</span></h2>
        </div>
      </div>
      <!-- Masonry project grid — all projects from config.js are shown here -->
      <div id="servicesProjects" class="projects-masonry">
        <!-- Auto-rendered from config.js → projects[] -->
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta-band py-24 px-6 md:px-16 relative overflow-hidden">
    <div class="noise-overlay opacity-30"></div>
    <div class="max-w-4xl mx-auto text-center relative z-10 scroll-reveal">
      <p class="section-eyebrow text-center">Interested?</p>
      <h2 class="cta-title">LET'S<br/><span class="stroke-text-red">WORK</span><br/>TOGETHER</h2>
      <a href="contact.html" class="btn-primary mt-10 inline-block text-lg">Get a Quote →</a>
    </div>
  </section>

  <footer class="footer-section px-6 md:px-16 py-16 border-t border-red-900/30" id="siteFooter"></footer>
  <button id="backToTop" title="Back to top">↑</button>
  <div id="cookieBanner"></div>

  <script src="config.js"></script>
  <script src="components.js"></script>
  <script src="main.js"></script>
</body>
</html>
